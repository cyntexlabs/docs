<svg viewBox="0 0 1100 740" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#555"/>
    </marker>
    <marker id="arrOrg" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#d4770a"/>
    </marker>
    <marker id="arrGrn" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 z" fill="#1e8a4e"/>
    </marker>
  </defs>

  <!-- ─── background ─── -->
  <rect width="1100" height="740" fill="white"/>

  <!-- ─── top surface labels ─── -->
  <text x="390" y="26" text-anchor="middle" fill="#444" font-size="13">Web Console</text>
  <text x="530" y="26" text-anchor="middle" fill="#444" font-size="13">CLI</text>

  <!-- ═══════════════════════════════════════════════════════
       CYNTEX MANAGER
  ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="36" width="710" height="98" rx="6" fill="#ddeef8" stroke="#7bbde0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="57" font-weight="600" fill="#1a4f80" font-size="13">Cyntex Manager</text>
  <!-- inner capability bar -->
  <rect x="40" y="65" width="672" height="54" rx="5" fill="#b3d6ef" stroke="#6aafe0" stroke-width="1"/>
  <text x="376" y="97" text-anchor="middle" fill="#0e3660" font-weight="600" font-size="13">MCP  |  Observability  |  Lineage &amp; Data Trace  |  Validation  |  Security</text>

  <!-- manager → engine arrows -->
  <line x1="280" y1="134" x2="280" y2="175" stroke="#666" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="580" y1="134" x2="580" y2="175" stroke="#666" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════════════════════
       CYNTEX ENGINE outer box
  ═══════════════════════════════════════════════════════ -->
  <rect x="20" y="175" width="710" height="510" rx="6" fill="#ddeef8" stroke="#7bbde0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="36" y="196" font-weight="600" fill="#1a4f80" font-size="13">Cyntex Engine</text>

  <!-- ─── Database cylinder ─── -->
  <ellipse cx="72" cy="326" rx="30" ry="10" fill="#bbb" stroke="#888" stroke-width="1.2"/>
  <rect x="42" y="285" width="60" height="41" fill="#ccc" stroke="#888" stroke-width="1.2"/>
  <ellipse cx="72" cy="285" rx="30" ry="10" fill="#ddd" stroke="#888" stroke-width="1.2"/>
  <text x="72" y="355" text-anchor="middle" fill="#555" font-size="11">Database</text>
  <text x="72" y="369" text-anchor="middle" fill="#555" font-size="11">Transaction</text>
  <text x="72" y="383" text-anchor="middle" fill="#555" font-size="11">Log</text>

  <!-- DB → CDC Capture -->
  <line x1="102" y1="305" x2="145" y2="305" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── CDC Capture ─── -->
  <rect x="148" y="278" width="132" height="56" rx="8" fill="#4a9fd4" stroke="#2475a8" stroke-width="1.3"/>
  <text x="214" y="311" text-anchor="middle" fill="white" font-weight="600" font-size="13">CDC Capture</text>

  <!-- CDC → Change Log Buffer -->
  <line x1="280" y1="306" x2="322" y2="333" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── Lookup Cache (orange, top) ─── -->
  <rect x="322" y="215" width="132" height="52" rx="8" fill="#f5972a" stroke="#c9780d" stroke-width="1.3"/>
  <text x="388" y="246" text-anchor="middle" fill="white" font-weight="600" font-size="13">Lookup Cache</text>

  <!-- Sync Cache label + vertical dashed line -->
  <text x="388" y="298" text-anchor="middle" fill="#7a6030" font-size="11">Sync Cache</text>
  <line x1="388" y1="267" x2="388" y2="322" stroke="#c9780d" stroke-width="1.2" stroke-dasharray="4,2"/>

  <!-- ─── Change Log Buffer (orange, center) ─── -->
  <rect x="322" y="325" width="132" height="58" rx="8" fill="#f5972a" stroke="#c9780d" stroke-width="1.3"/>
  <text x="388" y="350" text-anchor="middle" fill="white" font-weight="600" font-size="12">Change Log</text>
  <text x="388" y="368" text-anchor="middle" fill="white" font-weight="600" font-size="12">Buffer</text>

  <!-- Lookup Cache → Transform (Feeds) -->
  <line x1="454" y1="241" x2="498" y2="241" stroke="#c9780d" stroke-width="1.5" stroke-dasharray="5,2" marker-end="url(#arrOrg)"/>
  <text x="476" y="233" text-anchor="middle" fill="#7a5010" font-size="11">Feeds</text>

  <!-- ─── Transform ─── -->
  <rect x="500" y="213" width="132" height="58" rx="8" fill="#4a9fd4" stroke="#2475a8" stroke-width="1.3"/>
  <text x="566" y="248" text-anchor="middle" fill="white" font-weight="600" font-size="13">Transform</text>

  <!-- Change Log Buffer → Materialize -->
  <line x1="454" y1="354" x2="498" y2="354" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── Materialize ─── -->
  <rect x="500" y="325" width="132" height="58" rx="8" fill="#4a9fd4" stroke="#2475a8" stroke-width="1.3"/>
  <text x="566" y="360" text-anchor="middle" fill="white" font-weight="600" font-size="13">Materialize</text>

  <!-- Source Replica Store → Materialize (Join lookup, dashed green) -->
  <line x1="388" y1="506" x2="388" y2="430" stroke="#1e8a4e" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="388" y1="430" x2="500" y2="375" stroke="#1e8a4e" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrGrn)"/>
  <text x="450" y="448" text-anchor="middle" fill="#1e6e3e" font-size="11">Join lookup</text>

  <!-- Transform + Materialize → Push Context Server -->
  <line x1="632" y1="242" x2="768" y2="280" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="632" y1="354" x2="768" y2="340" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ─── Persist Change Log  (Buffer → Change Log Store) ─── -->
  <line x1="355" y1="383" x2="220" y2="483" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="258" y="435" text-anchor="middle" fill="#555" font-size="10" transform="rotate(-36,258,435)">Persist Change Log</text>

  <!-- ─── Sync Replica (Buffer → Source Replica Store) ─── -->
  <line x1="388" y1="383" x2="388" y2="483" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="400" y="440" fill="#555" font-size="10">Sync Replica</text>

  <!-- Materialize → Materialized View Store -->
  <line x1="566" y1="383" x2="566" y2="483" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ─── CYNTEX STORE inner section border ─── -->
  <rect x="35" y="470" width="680" height="198" rx="5" fill="#cce8dc" stroke="#5bb894" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Change Log Store -->
  <rect x="60" y="485" width="148" height="52" rx="6" fill="#27a58c" stroke="#1a7a68" stroke-width="1.2"/>
  <text x="134" y="508" text-anchor="middle" fill="white" font-weight="600" font-size="12">Change Log</text>
  <text x="134" y="526" text-anchor="middle" fill="white" font-weight="600" font-size="12">Store</text>

  <!-- Source Replica Store -->
  <rect x="314" y="485" width="148" height="52" rx="6" fill="#27a58c" stroke="#1a7a68" stroke-width="1.2"/>
  <text x="388" y="508" text-anchor="middle" fill="white" font-weight="600" font-size="12">Source Replica</text>
  <text x="388" y="526" text-anchor="middle" fill="white" font-weight="600" font-size="12">Store</text>

  <!-- Materialized View Store -->
  <rect x="492" y="485" width="164" height="52" rx="6" fill="#27a58c" stroke="#1a7a68" stroke-width="1.2"/>
  <text x="574" y="508" text-anchor="middle" fill="white" font-weight="600" font-size="12">Materialized</text>
  <text x="574" y="526" text-anchor="middle" fill="white" font-weight="600" font-size="12">View Store</text>

  <!-- three stores → Queryable Backup Store (collector lines) -->
  <line x1="134" y1="537" x2="134" y2="567" stroke="#555" stroke-width="1.2"/>
  <line x1="388" y1="537" x2="388" y2="567" stroke="#555" stroke-width="1.2"/>
  <line x1="574" y1="537" x2="574" y2="567" stroke="#555" stroke-width="1.2"/>
  <line x1="134" y1="567" x2="574" y2="567" stroke="#555" stroke-width="1.2"/>
  <line x1="354" y1="567" x2="354" y2="578" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Queryable Backup Store (dark green) -->
  <rect x="60" y="580" width="596" height="58" rx="6" fill="#27ae60" stroke="#1a8042" stroke-width="1.5"/>
  <text x="358" y="615" text-anchor="middle" fill="white" font-weight="700" font-size="14">Queryable Backup Store</text>

  <!-- Cyntex Store label -->
  <text x="36" y="698" fill="#1a4f80" font-weight="600" font-size="13">Cyntex Store</text>

  <!-- ═══════════════════════════════════════════════════════
       CYNTEX SERVE (right panel)
  ═══════════════════════════════════════════════════════ -->
  <rect x="748" y="175" width="332" height="510" rx="6" fill="#ddeef8" stroke="#7bbde0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="764" y="196" font-weight="600" fill="#1a4f80" font-size="13">Cyntex Serve</text>

  <!-- ─── Push Context Server ─── -->
  <rect x="762" y="225" width="134" height="85" rx="10" fill="#9ec5df" stroke="#5a9abf" stroke-width="1.3"/>
  <text x="829" y="261" text-anchor="middle" fill="#0e3660" font-weight="600" font-size="12">Push Context</text>
  <text x="829" y="279" text-anchor="middle" fill="#0e3660" font-weight="600" font-size="12">Server</text>

  <!-- Push outputs -->
  <rect x="930" y="215" width="110" height="30" rx="5" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="985" y="235" text-anchor="middle" fill="#333" font-size="12">Kafka</text>
  <rect x="930" y="254" width="110" height="30" rx="5" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="985" y="274" text-anchor="middle" fill="#333" font-size="12">LakeHouse</text>
  <rect x="930" y="293" width="110" height="30" rx="5" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="985" y="313" text-anchor="middle" fill="#333" font-size="12">Webhook</text>
  <!-- Push arrows -->
  <line x1="896" y1="248" x2="930" y2="230" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="896" y1="260" x2="930" y2="269" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="896" y1="272" x2="930" y2="308" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ─── Query Context Server ─── -->
  <rect x="762" y="358" width="134" height="85" rx="10" fill="#9ec5df" stroke="#5a9abf" stroke-width="1.3"/>
  <text x="829" y="394" text-anchor="middle" fill="#0e3660" font-weight="600" font-size="12">Query Context</text>
  <text x="829" y="412" text-anchor="middle" fill="#0e3660" font-weight="600" font-size="12">Server</text>

  <!-- MCP label + AI Agents output -->
  <text x="912" y="370" text-anchor="middle" fill="#555" font-size="11">MCP</text>
  <rect x="930" y="350" width="110" height="30" rx="5" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="985" y="370" text-anchor="middle" fill="#333" font-size="12">AI Agents</text>
  <!-- REST/GraphQL label + Applications output -->
  <text x="912" y="418" text-anchor="middle" fill="#555" font-size="11">REST</text>
  <text x="912" y="432" text-anchor="middle" fill="#555" font-size="11">GraphQL</text>
  <rect x="930" y="408" width="110" height="30" rx="5" fill="white" stroke="#aaa" stroke-width="1"/>
  <text x="985" y="428" text-anchor="middle" fill="#333" font-size="12">Applications</text>
  <!-- Query arrows -->
  <line x1="896" y1="375" x2="930" y2="365" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="896" y1="408" x2="930" y2="423" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
</svg>
